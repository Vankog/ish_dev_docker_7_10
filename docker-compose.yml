services:

  database:
    build:
      context: .
    image: ish_dev:mssql_2025_icm_db
    container_name: ish_dev_mssql_2025_icm_db
    restart: always
    ports:
      - 1433:1433
    volumes:
      - mssql:/var/opt/mssql
    secrets:
      - sa_password
    networks:
      - mssql
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -b -C -S localhost -U sa -P "$$(cat /run/secrets/sa_password)" -Q "SELECT 1; IF FULLTEXTSERVICEPROPERTY('IsFullTextInstalled') = 0 RAISERROR('FTS not installed', 16, 1)"
      timeout: 5s
      retries: 8
      interval: 30s
      start_period: 10s

  solr:
    image: solr:8.11.2
    container_name: solr
    ports:
     - 9983:9983 # zookeeper
     - 8983:8983
    volumes:
      - solr:/var/solr
    environment:
      # ZooKeper refers to the SOLR instances via IP by default. However, the docker-internal IP ranges (172.x) cannot be resolved from the host system.
      # Thus, we need to define a host name for each SOLR instance and add an according loopbacK entry to the hosts file.
      - SOLR_HOST=solr # hosts file entry: "127.0.0.1 solr"
      - SOLR_PORT=8983
    command: solr -f -cloud
    networks:
      - solr_zookeeper

  mail_server:
    image: rnwood/smtp4dev:latest
    container_name: smtp4dev
    ports:
      - 3000:80 # web interface
      - 25:25   # smpt port
    volumes:
      - mail_server:/smtp4dev
    networks:
      - smtp

volumes:
  mssql:
    name: ish_dev_mssql_2025_icm_db
  solr:
    name: ish_dev_solr_data
  mail_server:
    name: mail_server_data


networks:
  mssql:
  solr_zookeeper:
  smtp:


# The SA password is read from a file so it never appears in docker-compose.yml
# or the .env file.  Create the file once (it is git-ignored):
#   printf '!InterShop00!' > secrets/sa_password.txt
secrets:
  sa_password:
    file: ./secrets/sa_password.txt
