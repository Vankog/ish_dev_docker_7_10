services:
  database:
    build:
      context: .
    image: ish_dev:mssql_2025_icm_db
    pull_policy: never
    container_name: ish_dev_mssql_2025_icm_db
    restart: unless-stopped
    ports:
      # Bind to localhost only – avoids accidental exposure on all host interfaces.
      - 127.0.0.1:1433:1433
    volumes:
      - mssql:/var/opt/mssql
    secrets:
      - sa_password
    environment:
      - MSSQL_SA_PASSWORD_FILE=/run/secrets/sa_password
    networks:
      - mssql
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test:
        [
          "CMD-SHELL",
          '/opt/mssql-tools18/bin/sqlcmd -b -C -S localhost -U sa -P "$$(cat /run/secrets/sa_password)" -Q "SELECT 1; IF FULLTEXTSERVICEPROPERTY(''IsFullTextInstalled'') = 0 RAISERROR(''FTS not installed'', 16, 1)"',
        ]
      timeout: 5s
      retries: 8
      interval: 30s
      start_period: 10s

  solr:
    image: solr:10.0.0
    pull_policy: missing
    container_name: solr
    restart: unless-stopped
    ports:
      # Bind to localhost only. Add "127.0.0.1 solr" to your hosts file so that
      # Solr's self-reported host name (SOLR_HOST) resolves from the host machine.
      - 127.0.0.1:9983:9983 # ZooKeeper
      - 127.0.0.1:8983:8983
    volumes:
      - solr:/var/solr
    environment:
      # ZooKeeper refers to Solr instances via IP by default. Because Docker-internal
      # IPs (172.x) are not reachable from the host, we set a stable hostname.
      - SOLR_HOST_ADVERTISE=solr # hosts file entry: "127.0.0.1 solr"
      - SOLR_PORT=8983
    networks:
      - solr_zookeeper
    security_opt:
      - no-new-privileges:true
    healthcheck:
      # /api/node/health was added in Solr 8.1; returns {"status":"OK"} when the node is live.
      test:
        [
          "CMD-SHELL",
          'curl -sf http://localhost:8983/api/node/health | grep -q ''"status":"OK"''',
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

  mail_server:
    image: rnwood/smtp4dev:3.15.0
    pull_policy: missing
    container_name: smtp4dev
    restart: unless-stopped
    ports:
      - 127.0.0.1:3000:80 # web interface
      - 127.0.0.1:25:25 # SMTP port
    volumes:
      - mail_server:/smtp4dev
    networks:
      - smtp
    security_opt:
      - no-new-privileges:true
    healthcheck:
      # /api/messages returning HTTP 200 confirms both the web server and message store are ready.
      test:
        ["CMD-SHELL", "curl -sf http://localhost:80/api/messages > /dev/null"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  mssql:
    name: ish_dev_mssql_2025_icm_db
  solr:
    name: ish_dev_solr_data
  mail_server:
    name: mail_server_data

networks:
  mssql:
  solr_zookeeper:
  smtp:

# The SA password is read from a file so it never appears in docker-compose.yml
# or the .env file.  Create the file once (it is git-ignored).
secrets:
  sa_password:
    file: ./secrets/sa_password.txt
